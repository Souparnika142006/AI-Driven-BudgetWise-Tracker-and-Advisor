# ========================================================
# Spring Boot Configuration Properties
# ========================================================

server.port=8080

# 1. MySQL Connection Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/budgetwise_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_secure_mysql_password_here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Hibernate JPA Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# 3. Security Configurations (JWT Secret)
budgetwise.jwt.secret=9a67471b7965824b23831b1c3196a6d68b6c86e68d184cf4e727f2c69cfd0b2f
budgetwise.jwt.expiration-ms=86400000

# 4. JavaMail Sender Settings
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
